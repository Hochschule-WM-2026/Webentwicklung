<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WM 2026</title>
  <link rel="stylesheet" href="style.css">
  <script src="scripts/color_scheme.js"></script>
  <script src="scripts/data.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="hauptSeite">

  <section class="naechsteSpieleAbschnitt">
    <h3 class="abschnittTitel">Nächste Spiele</h3>

    <div class="naechsteSpieleBox" id="naechsteSpieleListe">
      <p class="infoSpielText">Spiele werden geladen...</p>
    </div>
  </section>

  <section class="gruppenAbschnitt">
    <h3 class="abschnittTitel">Alle Gruppen der WM</h3>
    
    <div class="sliderBox">
      <div class="gruppenBox" id="gruppenListe">
      </div>
    </div>
  </section>

  <section class="quizAbschnitt">
    <div class="quizBox">
      <div class="quizInhalt">
        <h3 class="quizTitel">Bist du ein echter Fußball-Experte?</h3>
        <p class="quizText">Testen dein Wissen rund um die Weltmeisterschaft im großen Tipp- und Wissensquiz!</p>
      </div>
      <a href="/views/quiz.html" class="quizKnopf">
        <span>Löse jetzt das WM Quiz</span>
        <i data-lucide="arrow-right"></i>
      </a>
    </div>
  </section>

</section>

  <script src="scripts/drawer.js"></script>
  <script src="scripts/components.js"></script>
  <script type="module" src="index.js"></script>
</body>
</html>
